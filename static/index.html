<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RBI Banking System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #141414;
    --border:   #222;
    --gold:     #c9a84c;
    --gold-dim: #7a6230;
    --text:     #e8e0d0;
    --muted:    #555;
    --green:    #4caf7d;
    --red:      #cf6679;
    --mono:     'IBM Plex Mono', monospace;
    --serif:    'DM Serif Display', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-family: var(--serif); font-size: 22px; color: var(--gold); letter-spacing: 0.02em; }
  header span { color: var(--muted); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; box-shadow: 0 0 6px var(--green); }

  nav { display: flex; border-bottom: 1px solid var(--border); padding: 0 32px; }
  nav button { background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px 20px 12px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  nav button:hover { color: var(--text); }
  nav button.active { color: var(--gold); border-bottom-color: var(--gold); }

  main { display: grid; grid-template-columns: 1fr 320px; gap: 0; height: calc(100vh - 97px); }
  .panel { padding: 24px 32px; overflow-y: auto; }
  .panel:first-child { border-right: 1px solid var(--border); }

  .label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  th { text-align: left; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; color: var(--text); vertical-align: middle; }
  tr:hover td { background: #161616; }

  .num { color: var(--gold); font-weight: 500; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .badge.active   { background: #1a2e22; color: var(--green); }
  .badge.inactive { background: #2a1a1e; color: var(--red); }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input, select { width: 100%; background: #111; border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 9px 12px; border-radius: 2px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: var(--gold-dim); }
  select option { background: #111; }

  button.primary { width: 100%; background: var(--gold); color: #000; border: none; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 11px; cursor: pointer; border-radius: 2px; margin-top: 4px; transition: background 0.15s; }
  button.primary:hover { background: #dbb85a; }
  button.primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  button.danger { background: none; border: 1px solid #2a1a1e; color: var(--red); font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; cursor: pointer; border-radius: 2px; transition: background 0.15s; }
  button.danger:hover { background: #2a1a1e; }

  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 2px; font-size: 12px; z-index: 999; animation: fadeup 0.2s ease; }
  .toast.ok  { background: #1a2e22; color: var(--green); border: 1px solid #2a4a32; }
  .toast.err { background: #2a1a1e; color: var(--red);   border: 1px solid #4a2a32; }
  @keyframes fadeup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
  .detail-row .key { color: var(--muted); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .detail-row .val { color: var(--text); text-align: right; }

  .empty { color: var(--muted); font-size: 11px; letter-spacing: 0.08em; padding: 32px 0; text-align: center; }
  .loading { color: var(--muted); font-size: 11px; letter-spacing: 0.1em; padding: 24px 0; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = "https://rbi-fastapi.onrender.com";

async function req(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || res.statusText);
  return data;
}

function fmt(rupees) {
  return "₹" + Number(rupees).toLocaleString("en-IN", { minimumFractionDigits: 2 });
}

function Badge({ v }) {
  return <span className={`badge ${v ? "active" : "inactive"}`}>{v ? "Active" : "Inactive"}</span>;
}

function Toast({ msg, type }) {
  if (!msg) return null;
  return <div className={`toast ${type}`}>{msg}</div>;
}

// ─── Shared data context ────────────────────────────────────
const DataCtx = React.createContext({});

function useData() { return React.useContext(DataCtx); }

// ─── USERS TAB ──────────────────────────────────────────────
function UsersTab({ toast }) {
  const { users, banks, refreshUsers } = useData();
  const [userId, setUserId] = React.useState("");
  const [user, setUser]     = React.useState(null);
  const [accs, setAccs]     = React.useState([]);
  const [name, setName]     = React.useState("");
  const [loading, setLoading] = React.useState(false);

  async function lookup(id) {
    const target = id || userId;
    if (!target) return;
    setLoading(true);
    try {
      const u = await req("GET", `/users/${target}`);
      const a = await req("GET", `/users/${target}/accounts`);
      setUser(u); setAccs(a);
    } catch(e) { toast(e.message, "err"); setUser(null); setAccs([]); }
    setLoading(false);
  }

  async function create() {
    if (!name.trim()) return;
    try {
      const u = await req("POST", "/users", { name: name.trim() });
      toast(`User #${u.id} created`, "ok");
      setName("");
      refreshUsers();
    } catch(e) { toast(e.message, "err"); }
  }

  async function deactivate(id) {
    try {
      await req("DELETE", `/users/${id}`);
      toast(`User #${id} deactivated`, "ok");
      setUser(null); setAccs([]);
      refreshUsers();
    } catch(e) { toast(e.message, "err"); }
  }

  return (
    <main>
      <div className="panel">
        <div className="label">Select user</div>
        <div style={{display:"flex", gap:8, marginBottom:24}}>
          <select value={userId} onChange={e=>{setUserId(e.target.value); lookup(e.target.value);}} style={{flex:1}}>
            <option value="">— Select a user —</option>
            {users.map(u=>(
              <option key={u.id} value={u.id}>
                #{u.id} · {u.name} · {u.activated ? "Active" : "Inactive"}
              </option>
            ))}
          </select>
        </div>

        {loading && <div className="loading">Fetching...</div>}

        {user && (
          <>
            <div className="label">User #{user.id}</div>
            {[
              ["Name",   user.name],
              ["Status", <Badge v={user.activated}/>],
              ["ID",     user.id],
            ].map(([k,v])=>(
              <div className="detail-row" key={k}>
                <span className="key">{k}</span>
                <span className="val">{v}</span>
              </div>
            ))}
            <div style={{marginTop:12}}>
              <button className="danger" onClick={()=>deactivate(user.id)}>Deactivate user</button>
            </div>

            {accs.length > 0 && (
              <>
                <div className="label" style={{marginTop:24}}>Accounts ({accs.length})</div>
                <table>
                  <thead><tr><th>ID</th><th>Bank</th><th>Type</th><th>Balance</th><th>Status</th></tr></thead>
                  <tbody>
                    {accs.map(a=>(
                      <tr key={a.id}>
                        <td>{a.id}</td>
                        <td>{a.bank_id}</td>
                        <td>{a.account_type}</td>
                        <td className="num">{fmt(a.balance)}</td>
                        <td><Badge v={a.activated}/></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </>
            )}
            {accs.length === 0 && !loading && <div className="empty">No accounts for this user</div>}
          </>
        )}
      </div>

      <div className="panel">
        <div className="label">New user</div>
        <div className="form-group">
          <label>Full Name</label>
          <input placeholder="e.g. Priyanshu Ranjan" value={name}
            onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&create()} />
        </div>
        <button className="primary" onClick={create} disabled={!name.trim()}>Create User</button>

        <div className="label" style={{marginTop:32}}>All users — {users.length} records</div>
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Status</th></tr></thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.id} style={{cursor:"pointer"}} onClick={()=>{setUserId(String(u.id));lookup(u.id);}}>
                <td>{u.id}</td>
                <td>{u.name}</td>
                <td><Badge v={u.activated}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </main>
  );
}

// ─── BANKS TAB ──────────────────────────────────────────────
function BanksTab({ toast }) {
  const { banks, refreshBanks } = useData();
  const [name, setName]     = React.useState("");
  const [bankId, setBankId] = React.useState("");
  const [accs, setAccs]     = React.useState([]);
  const [loading, setLoading] = React.useState(false);

  async function create() {
    if (!name.trim()) return;
    try {
      const b = await req("POST", "/banks", { name: name.trim() });
      toast(`Bank #${b.id} created`, "ok");
      setName("");
      refreshBanks();
    } catch(e) { toast(e.message, "err"); }
  }

  async function viewAccounts(id) {
    setLoading(true); setBankId(id);
    try {
      const a = await req("GET", `/banks/${id}/accounts`);
      setAccs(a);
    } catch(e) { toast(e.message, "err"); }
    setLoading(false);
  }

  return (
    <main>
      <div className="panel">
        <div className="label">All banks — {banks.length} records</div>
        <table>
          <thead><tr><th>ID</th><th>Name</th><th></th></tr></thead>
          <tbody>
            {banks.map(b=>(
              <tr key={b.id}>
                <td>{b.id}</td>
                <td>{b.name}</td>
                <td>
                  <button className="danger" style={{color:"#4caf7d",borderColor:"#1a2e22"}}
                    onClick={()=>viewAccounts(b.id)}>
                    View accounts
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>

        {loading && <div className="loading">Loading accounts...</div>}
        {bankId && accs.length > 0 && (
          <>
            <div className="label">Accounts in Bank #{bankId} ({accs.length})</div>
            <table>
              <thead><tr><th>ID</th><th>User</th><th>Type</th><th>Balance</th><th>Status</th></tr></thead>
              <tbody>
                {accs.map(a=>(
                  <tr key={a.id}>
                    <td>{a.id}</td><td>{a.user_id}</td><td>{a.account_type}</td>
                    <td className="num">{fmt(a.balance)}</td>
                    <td><Badge v={a.activated}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </>
        )}
        {bankId && accs.length === 0 && !loading && <div className="empty">No accounts in this bank</div>}
      </div>

      <div className="panel">
        <div className="label">New bank</div>
        <div className="form-group">
          <label>Bank Name</label>
          <input placeholder="e.g. Axis Bank" value={name}
            onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&create()} />
        </div>
        <button className="primary" onClick={create} disabled={!name.trim()}>Create Bank</button>
      </div>
    </main>
  );
}

// ─── ACCOUNTS TAB ───────────────────────────────────────────
function AccountsTab({ toast }) {
  const { users, banks, accounts, refreshAccounts } = useData();
  const [accId, setAccId]   = React.useState("");
  const [acc, setAcc]       = React.useState(null);
  const [txns, setTxns]     = React.useState([]);
  const [form, setForm]     = React.useState({user_id:"",bank_id:"",account_type:"Savings",balance:""});
  const [loading, setLoading] = React.useState(false);

  async function lookup(id) {
    const target = id || accId;
    if (!target) return;
    setLoading(true);
    try {
      const a = await req("GET", `/accounts/${target}`);
      const t = await req("GET", `/accounts/${target}/transactions`);
      setAcc(a); setTxns(t);
    } catch(e) { toast(e.message, "err"); setAcc(null); }
    setLoading(false);
  }

  async function create() {
    try {
      const a = await req("POST", "/accounts", {
        user_id: Number(form.user_id), bank_id: Number(form.bank_id),
        account_type: form.account_type, balance: Number(form.balance),
      });
      toast(`Account #${a.id} created`, "ok");
      setForm({user_id:"",bank_id:"",account_type:"Savings",balance:""});
      refreshAccounts();
    } catch(e) { toast(e.message, "err"); }
  }

  async function deactivate(id) {
    try {
      await req("DELETE", `/accounts/${id}`);
      toast(`Account #${id} deactivated`, "ok");
      setAcc(null); setTxns([]);
      refreshAccounts();
    } catch(e) { toast(e.message, "err"); }
  }

  const f = v => setForm(p=>({...p,...v}));

  return (
    <main>
      <div className="panel">
        <div className="label">Select account</div>
        <div style={{display:"flex", gap:8, marginBottom:24}}>
          <select value={accId} onChange={e=>{setAccId(e.target.value); lookup(e.target.value);}} style={{flex:1}}>
            <option value="">— Select an account —</option>
            {accounts.map(a=>(
              <option key={a.id} value={a.id}>
                #{a.id} · User {a.user_id} · {a.account_type} · {fmt(a.balance)}
              </option>
            ))}
          </select>
        </div>

        {loading && <div className="loading">Fetching...</div>}

        {acc && (
          <>
            <div className="label">Account #{acc.id}</div>
            {[
              ["User ID",  acc.user_id],
              ["Bank ID",  acc.bank_id],
              ["Type",     acc.account_type],
              ["Balance",  <span className="num">{fmt(acc.balance)}</span>],
              ["Status",   <Badge v={acc.activated}/>],
            ].map(([k,v])=>(
              <div className="detail-row" key={k}>
                <span className="key">{k}</span>
                <span className="val">{v}</span>
              </div>
            ))}
            <div style={{marginTop:12}}>
              <button className="danger" onClick={()=>deactivate(acc.id)}>Deactivate account</button>
            </div>

            {txns.length > 0 && (
              <>
                <div className="label" style={{marginTop:24}}>Transaction history ({txns.length})</div>
                <table>
                  <thead><tr><th>ID</th><th>From</th><th>To</th><th>Amount</th></tr></thead>
                  <tbody>
                    {txns.map(t=>(
                      <tr key={t.id}>
                        <td>{t.id}</td><td>{t.from_id}</td><td>{t.to_id}</td>
                        <td className="num">{fmt(t.amount)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </>
            )}
          </>
        )}
      </div>

      <div className="panel">
        <div className="label">New account</div>
        <div className="form-group">
          <label>User</label>
          <select value={form.user_id} onChange={e=>f({user_id:e.target.value})}>
            <option value="">— Select user —</option>
            {users.map(u=><option key={u.id} value={u.id}>#{u.id} · {u.name}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>Bank</label>
          <select value={form.bank_id} onChange={e=>f({bank_id:e.target.value})}>
            <option value="">— Select bank —</option>
            {banks.map(b=><option key={b.id} value={b.id}>#{b.id} · {b.name}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>Account Type</label>
          <select value={form.account_type} onChange={e=>f({account_type:e.target.value})}>
            {["Savings","Current","Fixed Deposit","Salary","Business"].map(t=>(
              <option key={t}>{t}</option>
            ))}
          </select>
        </div>
        <div className="form-group">
          <label>Opening Balance (₹)</label>
          <input type="number" placeholder="e.g. 5000" value={form.balance}
            onChange={e=>f({balance:e.target.value})} />
        </div>
        <button className="primary" onClick={create}
          disabled={!form.user_id||!form.bank_id||!form.balance}>
          Create Account
        </button>
      </div>
    </main>
  );
}

// ─── TRANSACTIONS TAB ───────────────────────────────────────
function TransactionsTab({ toast }) {
  const { accounts } = useData();
  const [form, setForm] = React.useState({from_id:"",to_id:"",amount:""});
  const [txnId, setTxnId] = React.useState("");
  const [txn, setTxn]     = React.useState(null);

  async function create() {
    try {
      const t = await req("POST", "/transactions", {
        from_id: Number(form.from_id), to_id: Number(form.to_id), amount: Number(form.amount),
      });
      toast(`Transaction #${t.id} complete — ${fmt(t.amount)} transferred`, "ok");
      setForm({from_id:"",to_id:"",amount:""});
    } catch(e) { toast(e.message, "err"); }
  }

  async function lookup() {
    if (!txnId) return;
    try {
      const t = await req("GET", `/transactions/${txnId}`);
      setTxn(t);
    } catch(e) { toast(e.message, "err"); setTxn(null); }
  }

  const f = v => setForm(p=>({...p,...v}));

  const activeAccounts = accounts.filter(a => a.activated);

  return (
    <main>
      <div className="panel">
        <div className="label">Lookup transaction</div>
        <div style={{display:"flex", gap:8, marginBottom:24}}>
          <input placeholder="Transaction ID" value={txnId}
            onChange={e=>setTxnId(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&lookup()}
            style={{flex:1}} />
          <button className="primary" style={{width:"auto",padding:"9px 20px"}} onClick={lookup}>Fetch</button>
        </div>

        {txn && (
          <>
            <div className="label">Transaction #{txn.id}</div>
            {[
              ["From account", txn.from_id],
              ["To account",   txn.to_id],
              ["Amount",       <span className="num">{fmt(txn.amount)}</span>],
              ["Time",         new Date(txn.transaction_time).toLocaleString("en-IN")],
            ].map(([k,v])=>(
              <div className="detail-row" key={k}>
                <span className="key">{k}</span>
                <span className="val">{v}</span>
              </div>
            ))}
          </>
        )}
      </div>

      <div className="panel">
        <div className="label">New transaction</div>
        <div className="form-group">
          <label>From Account</label>
          <select value={form.from_id} onChange={e=>f({from_id:e.target.value})}>
            <option value="">— Select source account —</option>
            {activeAccounts.map(a=>(
              <option key={a.id} value={a.id}>
                #{a.id} · {a.account_type} · {fmt(a.balance)}
              </option>
            ))}
          </select>
        </div>
        <div className="form-group">
          <label>To Account</label>
          <select value={form.to_id} onChange={e=>f({to_id:e.target.value})}>
            <option value="">— Select destination account —</option>
            {activeAccounts.filter(a=>String(a.id)!==String(form.from_id)).map(a=>(
              <option key={a.id} value={a.id}>
                #{a.id} · {a.account_type} · {fmt(a.balance)}
              </option>
            ))}
          </select>
        </div>
        <div className="form-group">
          <label>Amount (₹)</label>
          <input type="number" placeholder="e.g. 500" value={form.amount}
            onChange={e=>f({amount:e.target.value})} />
        </div>
        <button className="primary" onClick={create}
          disabled={!form.from_id||!form.to_id||!form.amount}>
          Transfer Funds
        </button>
      </div>
    </main>
  );
}

// ─── ROOT ───────────────────────────────────────────────────
const TABS = ["Users","Banks","Accounts","Transactions"];

function App() {
  const [tab, setTab]   = React.useState("Users");
  const [msg, setMsg]   = React.useState(null);
  const [type, setType] = React.useState("ok");
  const timerRef        = React.useRef(null);

  const [users,    setUsers]    = React.useState([]);
  const [banks,    setBanks]    = React.useState([]);
  const [accounts, setAccounts] = React.useState([]);

  async function refreshUsers()    { try { setUsers(await req("GET","/users"));       } catch(_){} }
  async function refreshBanks()    { try { setBanks(await req("GET","/banks"));       } catch(_){} }
  async function refreshAccounts() { try { setAccounts(await req("GET","/accounts")); } catch(_){} }

  React.useEffect(() => {
    refreshUsers();
    refreshBanks();
    refreshAccounts();
  }, []);

  function toast(message, kind="ok") {
    setMsg(message); setType(kind);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(()=>setMsg(null), 3500);
  }

  const ctx = { users, banks, accounts, refreshUsers, refreshBanks, refreshAccounts };
  const props = { toast };

  return (
    <DataCtx.Provider value={ctx}>
      <header>
        <h1>RBI Internal Operations Dashboard — Authorized Personnel Only</h1>
        <span><span className="status-dot"/>Live · rbi-fastapi.onrender.com</span>
      </header>
      <nav>
        {TABS.map(t=>(
          <button key={t} className={tab===t?"active":""} onClick={()=>setTab(t)}>{t}</button>
        ))}
      </nav>
      {tab==="Users"        && <UsersTab        {...props}/>}
      {tab==="Banks"        && <BanksTab         {...props}/>}
      {tab==="Accounts"     && <AccountsTab      {...props}/>}
      {tab==="Transactions" && <TransactionsTab  {...props}/>}
      <Toast msg={msg} type={type}/>
    </DataCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
